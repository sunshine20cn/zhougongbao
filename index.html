<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="周公宝 - AI解梦，梦里乾坤，周公宝来解">
  <title>周公宝 - AI解梦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #F5F0E8;
      color: #2C2C2C;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    /* 水墨纹理背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        radial-gradient(ellipse at 20% 0%, rgba(45,90,74,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(45,90,74,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    #app { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
